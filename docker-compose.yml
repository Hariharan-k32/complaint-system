version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: cms_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: complaint_system
    networks:
      - cms_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cms_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/complaint_system
      JWT_SECRET: change_this_in_production_super_long_secret_key_min_32_chars
      JWT_EXPIRE: 30d
      CLIENT_URL: http://localhost:3000
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - cms_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000/api/v1
        REACT_APP_SOCKET_URL: http://localhost:5000
    container_name: cms_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cms_network

volumes:
  mongodb_data:

networks:
  cms_network:
    driver: bridge
